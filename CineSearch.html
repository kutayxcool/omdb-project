<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSearch — Film Arama</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #141416;
    --bg3: #1c1c20;
    --card: #1a1a1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #a09d97;
    --text3: #6a6865;
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.12);
    --red: #e85a4f;
    --green: #5acea0;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1rem, 4vw, 2.5rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    text-decoration: none;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

  /* HERO */
  .hero {
    padding: clamp(3rem, 8vw, 6rem) clamp(1rem, 4vw, 2.5rem) clamp(2rem, 5vw, 3rem);
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
    color: var(--text);
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    color: var(--text2);
    font-size: 1.05rem;
    margin-bottom: 2.5rem;
  }

  /* SEARCH BOX */
  .search-wrap {
    display: flex;
    gap: 8px;
    max-width: 560px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .search-wrap input {
    flex: 1;
    min-width: 200px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 0 1rem;
    height: 48px;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--accent); }

  .filters {
    display: flex;
    gap: 8px;
    max-width: 560px;
    margin: 0 auto 0;
    flex-wrap: wrap;
  }
  .filters select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 0.8rem;
    height: 38px;
    font-size: 0.875rem;
    color: var(--text2);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .filters select:focus { border-color: var(--accent); color: var(--text); }

  .btn-search {
    height: 48px;
    padding: 0 1.5rem;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.9; }
  .btn-search:active { transform: scale(0.98); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2.5rem) 4rem;
  }

  /* STATUS */
  #status {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text2);
    font-size: 0.95rem;
  }
  #status .status-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 0.75rem;
    opacity: 0.5;
  }
  .error-msg {
    background: rgba(232,90,79,0.1);
    border: 1px solid rgba(232,90,79,0.25);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    color: var(--red);
    text-align: center;
    max-width: 480px;
    margin: 2rem auto;
  }

  /* RESULTS COUNT */
  .results-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-top: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .results-meta h2 {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text2);
  }
  .results-meta h2 strong { color: var(--accent); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  /* MOVIE CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--border2);
    transform: translateY(-3px);
  }
  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--bg3);
  }
  .card-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 2.5rem;
  }
  .card-body {
    padding: 0.75rem;
  }
  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 0.78rem;
    color: var(--text3);
  }
  .type-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(13,13,15,0.82);
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 7px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text2);
    backdrop-filter: blur(4px);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    padding: 1rem;
    overflow-y: auto;
    align-items: flex-start;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    max-width: 780px;
    width: 100%;
    margin: auto;
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-inner {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
  }
  @media (max-width: 560px) {
    .modal-inner { grid-template-columns: 1fr; }
    .modal-poster-wrap { display: none; }
  }
  .modal-poster-wrap {
    background: var(--bg3);
  }
  .modal-poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    min-height: 300px;
  }
  .modal-content {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .modal-title {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .modal-year {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  .btn-close {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--text2);
    font-size: 1.1rem;
    transition: background 0.15s;
  }
  .btn-close:hover { background: var(--border); color: var(--text); }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .star { color: var(--accent); font-size: 1rem; }
  .rating-val { font-size: 1.1rem; font-weight: 700; }
  .rating-total { font-size: 0.8rem; color: var(--text3); }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.78rem;
    color: var(--text2);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem 1rem;
  }
  .detail-item label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin-bottom: 2px;
  }
  .detail-item p {
    font-size: 0.9rem;
    color: var(--text);
  }

  .modal-plot {
    font-size: 0.92rem;
    color: var(--text2);
    line-height: 1.7;
    border-left: 2px solid var(--border2);
    padding-left: 1rem;
  }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .skeleton-img { width: 100%; aspect-ratio: 2/3; }
  .skeleton-line { height: 14px; margin: 8px; }
  .skeleton-line.short { width: 60%; }

  /* LOAD MORE */
  .load-more-wrap {
    text-align: center;
    margin-top: 2rem;
  }
  .btn-more {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text2);
    padding: 0.6rem 1.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-more:hover { background: var(--bg3); color: var(--text); }

  /* MODAL LOADING */
  .modal-loading {
    padding: 3rem;
    text-align: center;
    color: var(--text2);
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SEARCH HINT */
  .search-filters-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-dot"></div>
    CineSearch
  </a>
  <span style="font-size:0.8rem; color: var(--text3);">OMDB Film Veritabanı</span>
</header>

<section class="hero">
  <h1>Milyonlarca filmi<br><span>anında ara.</span></h1>
  <p>Başlık, oyuncu, yönetmen veya tür ile film ve dizi bilgilerini keşfet.</p>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Film adı yaz..." autocomplete="off" />
    <button class="btn-search" id="searchBtn">Ara</button>
  </div>
  <div class="search-filters-row">
    <select id="filterType">
      <option value="">Tüm Türler</option>
      <option value="movie">Film</option>
      <option value="series">Dizi</option>
      <option value="episode">Bölüm</option>
    </select>
    <select id="filterYear">
      <option value="">Tüm Yıllar</option>
    </select>
  </div>
</section>

<main>
  <div id="status">
    <span class="status-icon">🎬</span>
    Aramak için yukarıdaki arama kutusunu kullan
  </div>
  <div id="resultsMeta" class="results-meta" style="display:none"></div>
  <div class="grid" id="grid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="btn-more" id="loadMoreBtn">Daha fazla yükle</button>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div id="modalContent"></div>
  </div>
</div>

<script>
const API_KEY = '20aa3709'; 
const BASE_URL = 'https://www.omdbapi.com/';

let currentSearch = '';
let currentType = '';
let currentYear = '';
let currentPage = 1;
let totalResults = 0;

// Yıl filtresi doldur
const filterYear = document.getElementById('filterYear');
const currentYear_ = new Date().getFullYear();
for (let y = currentYear_; y >= 1900; y--) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y;
  filterYear.appendChild(opt);
}

// URL'den son aramayı geri yükle (LocalStorage)
function restoreState() {
  try {
    const saved = localStorage.getItem('cinesearch_state');
    if (saved) {
      const s = JSON.parse(saved);
      document.getElementById('searchInput').value = s.query || '';
      document.getElementById('filterType').value = s.type || '';
      document.getElementById('filterYear').value = s.year || '';
      if (s.query) doSearch(s.query, s.type, s.year, 1, false);
    }
  } catch(e) {}
}

function saveState(query, type, year) {
  try {
    localStorage.setItem('cinesearch_state', JSON.stringify({ query, type, year }));
  } catch(e) {}
}

// SEARCH
async function doSearch(query, type, year, page, append) {
  if (!query.trim()) return;

  currentSearch = query;
  currentType = type;
  currentYear = year;
  currentPage = page;
  saveState(query, type, year);

  if (!append) {
    showSkeletons();
    document.getElementById('loadMoreWrap').style.display = 'none';
    document.getElementById('resultsMeta').style.display = 'none';
  } else {
    document.getElementById('loadMoreBtn').textContent = 'Yükleniyor...';
    document.getElementById('loadMoreBtn').disabled = true;
  }

  const params = new URLSearchParams({ apikey: API_KEY, s: query, page });
  if (type) params.set('type', type);
  if (year) params.set('y', year);

  try {
    const res = await fetch(`${BASE_URL}?${params}`);
    const data = await res.json();

    if (data.Response === 'True') {
      totalResults = parseInt(data.totalResults);
      renderResults(data.Search, append, totalResults);
    } else {
      showError(data.Error || 'Film bulunamadı.');
    }
  } catch(e) {
    showError('Bağlantı hatası. İnternet bağlantınızı kontrol edin.');
  }
}

function showSkeletons() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(8).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-line" style="margin:10px 8px 4px"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>`).join('');
  document.getElementById('status').style.display = 'none';
}

function showError(msg) {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('status').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  document.getElementById('status').style.display = '';
  document.getElementById('resultsMeta').style.display = 'none';
  document.getElementById('loadMoreWrap').style.display = 'none';
}

function renderResults(movies, append, total) {
  const grid = document.getElementById('grid');
  if (!append) grid.innerHTML = '';

  movies.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', `${m.Title} (${m.Year})`);

    const hasPoster = m.Poster && m.Poster !== 'N/A';
    const typeLabel = { movie: 'Film', series: 'Dizi', episode: 'Bölüm' }[m.Type] || m.Type;

    card.innerHTML = `
      <span class="type-badge">${typeLabel}</span>
      ${hasPoster
        ? `<img class="card-poster" src="${m.Poster}" alt="${m.Title} posteri" loading="lazy" />`
        : `<div class="card-poster-placeholder">🎞️</div>`
      }
      <div class="card-body">
        <div class="card-title" title="${m.Title}">${m.Title}</div>
        <div class="card-meta">${m.Year}</div>
      </div>`;

    card.addEventListener('click', () => openModal(m.imdbID));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(m.imdbID); });
    grid.appendChild(card);
  });

  document.getElementById('status').style.display = 'none';

  const meta = document.getElementById('resultsMeta');
  const shown = grid.children.length;
  meta.innerHTML = `<h2><strong>${shown}</strong> / ${total} sonuç gösteriliyor — "<em>${currentSearch}</em>"</h2>`;
  meta.style.display = 'flex';

  const loadMoreWrap = document.getElementById('loadMoreWrap');
  if (shown < total) {
    loadMoreWrap.style.display = 'block';
    const btn = document.getElementById('loadMoreBtn');
    btn.textContent = 'Daha fazla yükle';
    btn.disabled = false;
  } else {
    loadMoreWrap.style.display = 'none';
  }
}

// MODAL
async function openModal(imdbID) {
  const modal = document.getElementById('modal');
  document.getElementById('modalContent').innerHTML = `<div class="modal-loading"><div class="spinner"></div>Yükleniyor...</div>`;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(`${BASE_URL}?apikey=${API_KEY}&i=${imdbID}&plot=full`);
    const d = await res.json();

    if (d.Response !== 'True') throw new Error(d.Error);

    const hasPoster = d.Poster && d.Poster !== 'N/A';
    const rating = d.imdbRating && d.imdbRating !== 'N/A' ? d.imdbRating : null;
    const genres = d.Genre && d.Genre !== 'N/A' ? d.Genre.split(',').map(g => g.trim()) : [];

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-inner">
        <div class="modal-poster-wrap">
          ${hasPoster
            ? `<img class="modal-poster" src="${d.Poster}" alt="${d.Title}" />`
            : `<div style="width:100%;height:100%;min-height:300px;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--text3)">🎞️</div>`
          }
        </div>
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <div class="modal-title">${d.Title}</div>
              <div class="modal-year">${d.Year} · ${d.Runtime !== 'N/A' ? d.Runtime : ''} · ${d.Rated !== 'N/A' ? d.Rated : ''}</div>
            </div>
            <button class="btn-close" id="closeModal" aria-label="Kapat">✕</button>
          </div>

          ${rating ? `
          <div class="rating-row">
            <span class="star">★</span>
            <span class="rating-val">${rating}</span>
            <span class="rating-total">/ 10 · IMDb</span>
            ${d.imdbVotes && d.imdbVotes !== 'N/A' ? `<span style="font-size:0.78rem;color:var(--text3)">(${d.imdbVotes} oy)</span>` : ''}
          </div>` : ''}

          ${genres.length ? `<div class="tags">${genres.map(g => `<span class="tag">${g}</span>`).join('')}</div>` : ''}

          ${d.Plot && d.Plot !== 'N/A' ? `<p class="modal-plot">${d.Plot}</p>` : ''}

          <div class="detail-grid">
            ${d.Director && d.Director !== 'N/A' ? `<div class="detail-item"><label>Yönetmen</label><p>${d.Director}</p></div>` : ''}
            ${d.Writer && d.Writer !== 'N/A' ? `<div class="detail-item"><label>Senarist</label><p>${d.Writer}</p></div>` : ''}
            ${d.Actors && d.Actors !== 'N/A' ? `<div class="detail-item" style="grid-column:1/-1"><label>Oyuncular</label><p>${d.Actors}</p></div>` : ''}
            ${d.Language && d.Language !== 'N/A' ? `<div class="detail-item"><label>Dil</label><p>${d.Language}</p></div>` : ''}
            ${d.Country && d.Country !== 'N/A' ? `<div class="detail-item"><label>Ülke</label><p>${d.Country}</p></div>` : ''}
            ${d.BoxOffice && d.BoxOffice !== 'N/A' ? `<div class="detail-item"><label>Gişe</label><p>${d.BoxOffice}</p></div>` : ''}
            ${d.Awards && d.Awards !== 'N/A' ? `<div class="detail-item" style="grid-column:1/-1"><label>Ödüller</label><p>${d.Awards}</p></div>` : ''}
          </div>
        </div>
      </div>`;

    document.getElementById('closeModal').addEventListener('click', closeModal);
  } catch(e) {
    document.getElementById('modalContent').innerHTML = `<div class="modal-loading" style="color:var(--red)">⚠️ Detaylar yüklenemedi.</div>`;
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// EVENTS
document.getElementById('searchBtn').addEventListener('click', () => {
  doSearch(document.getElementById('searchInput').value,
           document.getElementById('filterType').value,
           document.getElementById('filterYear').value, 1, false);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

document.getElementById('loadMoreBtn').addEventListener('click', () => {
  doSearch(currentSearch, currentType, currentYear, currentPage + 1, true);
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});


restoreState();
</script>
</body>
</html>
